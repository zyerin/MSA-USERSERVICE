name: CI/CD for User-Service

# 동작 조건 설정 : main 브랜치에 push 혹은 pull request가 발생할 경우 동작
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-docker-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 체크아웃
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Java 17 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. application.yml 생성
    - name: Create application.yml
      run: |
        mkdir ./src/main/resources || true
        cd ./src/main/resources
        rm -rf ./application.properties || true
        echo "${{ secrets.APPLICATION_YML }}" | base64 --decode  > ./application.yml
      shell: bash

    # 4. Gradle로 Spring Boot 빌드
    - name: Build Spring Boot Application
      run: |
        chmod +x ./gradlew
        ./gradlew clean build -x test

    # 5. Docker 이미지 빌드
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:latest .

    # 6. DockerHub 로그인
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # 7. Docker Hub로 이미지 푸시
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:latest
